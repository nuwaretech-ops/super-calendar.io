name: Upptime Graphs

on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [graphs]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: ${{ github.repository }}-upptime
  cancel-in-progress: false

jobs:
  graphs:
    name: Update status graphs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Generate graphs
        uses: upptime/uptime-monitor@v1.42.2
        with:
          command: graphs
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
