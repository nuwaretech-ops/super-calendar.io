name: Upptime Uptime

on:
  schedule:
    - cron: "*/30 * * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.repository }}-upptime
  cancel-in-progress: false

jobs:
  uptime:
    name: Check endpoint status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check status
        uses: upptime/uptime-monitor@v1.42.2
        with:
          command: update
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
