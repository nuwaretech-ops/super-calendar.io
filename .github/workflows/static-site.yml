name: Upptime Static Site

on:
  schedule:
    - cron: "0 * * * *"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.repository }}-upptime
  cancel-in-progress: false

jobs:
  static-site:
    name: Build status website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Build static site
        uses: upptime/uptime-monitor@v1.42.2
        with:
          command: static-site
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
