name: Upptime Response Time

on:
  schedule:
    - cron: "0 */6 * * *"
  repository_dispatch:
    types: [response_time]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.repository }}-upptime
  cancel-in-progress: false

jobs:
  response-time:
    name: Update response time data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Update response time
        uses: upptime/uptime-monitor@v1.42.2
        with:
          command: response-time
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
