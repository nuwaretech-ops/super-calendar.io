<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="src/css/style.css">
<script src="src/js/script.js" defer></script>
<title>Super-Calendar — Status</title>
</head>
<body>

<nav>
  <img src="https://icons.duckduckgo.com/ip3/super-calendar.io.ico" alt="Super-Calendar logo" onerror="this.style.display='none'">
  <span class="brand">super-calendar.io</span>
  <span class="spacer"></span>
  <a href="https://super-calendar.io" target="_blank" rel="noopener" class="nav-link">Site</a>
  <a href="https://super-calendar.io/api/swagger/" target="_blank" rel="noopener" class="nav-link">API</a>
</nav>

<main>
  <div class="page-header">
    <h1>Status</h1>
    <p id="last-updated">Loading...</p>
  </div>

  <div id="banner" class="banner all-up" style="display:none">
    <span class="dot"></span>
    <span id="banner-text"></span>
  </div>

  <div class="section-label">Services</div>

  <div class="service-list" id="service-list">
    <div class="skeleton-row"><div class="skeleton" style="width:60%;"></div></div>
    <div class="skeleton-row"><div class="skeleton" style="width:45%;"></div></div>
    <div class="skeleton-row"><div class="skeleton" style="width:70%;"></div></div>
    <div class="skeleton-row"><div class="skeleton" style="width:50%;"></div></div>
    <div class="skeleton-row"><div class="skeleton" style="width:65%;"></div></div>
  </div>

  <footer>
    Dados via <a href="https://github.com/NuwareTech/super-calendar.io" target="_blank" rel="noopener">GitHub Upptime</a>
    &nbsp;·&nbsp; Atualizado automaticamente a cada visita.
  </footer>
</main>

</body>
</html>
